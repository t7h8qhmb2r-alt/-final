<!DOCTYPE html>

<html class="dark" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0e1224;
            color: #dee1fb;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#1b1f31",
                        "on-tertiary-fixed": "#291800",
                        "on-primary-fixed-variant": "#454652",
                        "secondary-fixed-dim": "#4ad7f3",
                        "surface-container-highest": "#303447",
                        "primary-container": "#1a1b26",
                        "on-surface": "#dee1fb",
                        "on-secondary-container": "#00424d",
                        "on-primary-fixed": "#1a1b26",
                        "tertiary-fixed-dim": "#f0be75",
                        "tertiary-container": "#291800",
                        "on-primary-container": "#838391",
                        "surface-container-high": "#25293c",
                        "on-surface-variant": "#c8c5cc",
                        "surface-container-lowest": "#090d1f",
                        "tertiary": "#f0be75",
                        "on-error-container": "#ffdad6",
                        "primary": "#c6c5d4",
                        "outline-variant": "#47464c",
                        "secondary-container": "#00b6d0",
                        "inverse-primary": "#5d5d6a",
                        "secondary-fixed": "#a6eeff",
                        "error": "#ffb4ab",
                        "on-error": "#690005",
                        "tertiary-fixed": "#ffddb2",
                        "on-primary": "#2f303b",
                        "error-container": "#93000a",
                        "surface-tint": "#c6c5d4",
                        "surface-container-low": "#161b2d",
                        "secondary": "#4ad7f3",
                        "surface-dim": "#0e1224",
                        "on-secondary-fixed-variant": "#004e5b",
                        "inverse-on-surface": "#2b2f43",
                        "primary-fixed": "#e2e1f1",
                        "on-tertiary-container": "#a77c3a",
                        "inverse-surface": "#dee1fb",
                        "surface-variant": "#303447",
                        "on-secondary": "#00363f",
                        "primary-fixed-dim": "#c6c5d4",
                        "on-secondary-fixed": "#001f25",
                        "on-tertiary": "#442b00",
                        "surface-bright": "#34384c",
                        "outline": "#919096",
                        "surface": "#0e1224",
                        "background": "#0e1224",
                        "on-tertiary-fixed-variant": "#624000",
                        "on-background": "#dee1fb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "40px",
                        "sm": "16px",
                        "base": "4px",
                        "md": "24px",
                        "gutter": "20px",
                        "xs": "8px",
                        "margin": "32px",
                        "xl": "64px"
                    },
                    "fontFamily": {
                        "body-lg": ["Space Grotesk"],
                        "mono-data": ["Space Grotesk"],
                        "h1": ["Space Grotesk"],
                        "label-caps": ["Space Grotesk"],
                        "body-md": ["Space Grotesk"],
                        "h3": ["Space Grotesk"],
                        "h2": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "mono-data": ["14px", {"lineHeight": "1.4", "fontWeight": "500"}],
                        "h1": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "h3": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "h2": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#1A1B26] border-b-2 border-[#414868] shadow-[0px_4px_0px_0px_rgba(26,27,38,0.5)]">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[#2DD4BF]" data-icon="terminal">terminal</span>
<h1 class="font-['Space_Grotesk'] uppercase tracking-tighter font-bold text-xl font-black text-[#2DD4BF] tracking-widest">サイバー・ラボ ターミナル</h1>
</div>
<div class="flex items-center gap-sm">
<button class="material-symbols-outlined text-[#565F89] hover:bg-[#2F3549] hover:text-[#2DD4BF] p-xs transition-all duration-75 active:translate-y-[2px]" data-icon="account_tree">account_tree</button>
</div>
</header>
<!-- Main Content: Map Interface -->
<main class="flex-grow pt-16 pb-20 relative overflow-hidden">
<!-- Map Canvas -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-[#0e1224] relative overflow-hidden">
<!-- Simulated Map Texture -->
<img class="w-full h-full object-cover opacity-40 mix-blend-luminosity" data-alt="A highly detailed topographic digital map of Tokyo at night, featuring glowing neon blue data lines and high-contrast dark grids. The aesthetic is futuristic and clinical, with sharp geometric patterns and a nocturnal color palette dominated by midnight blue and electric teal. Minimalist markers and thin architectural outlines create a sophisticated laboratory terminal atmosphere." data-location="Tokyo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBahpZuvN9FqdHaOYh2TxfbxEmNaXacU2wbz4i7dli782IemKxfqx8aMqXxFIiEc-ci9psVt_CeY4RovGFgwLuN8Op3X0zE8xE-Mqj8pJSZCZm5OGlfhyCwMiHlCK-yLo0jWrmISgtkwdNRPcqe_qr1DeLu8HS3Y7oRRsbCJT26fOgTmVhS2TKxdIeE7DRggC5JnucmJGoi8zShUjsm-O2-5Btl30g_W5nnLbvqUYgtiKz3Oh_uv-tYGgdT8Rn3ykCeJMtt_rWNMoo"/>
<!-- Grid Overlay -->
<div class="absolute inset-0 pointer-events-none opacity-20" style="background-image: linear-gradient(#414868 1px, transparent 1px), linear-gradient(90deg, #414868 1px, transparent 1px); background-size: 40px 40px;"></div>
</div>
</div>
<!-- UI Overlays -->
<div class="relative z-10 p-gutter h-full flex flex-col justify-between pointer-events-none">
<!-- Top Controls -->
<div class="flex flex-col gap-sm max-w-xs pointer-events-auto">
<div class="bg-surface-container-high border-2 border-[#414868] p-sm shadow-[4px_4px_0px_0px_rgba(26,27,38,0.5)]">
<div class="flex items-center justify-between mb-xs">
<span class="font-label-caps text-label-caps text-secondary">SYSTEM_STATUS</span>
<div class="w-2 h-2 rounded-full bg-secondary animate-pulse"></div>
</div>
<div class="space-y-xs">
<div class="flex justify-between font-mono-data text-mono-data">
<span class="text-on-surface-variant">SCAN_RADIUS:</span>
<span class="text-on-surface">5.0 KM</span>
</div>
<div class="flex justify-between font-mono-data text-mono-data">
<span class="text-on-surface-variant">ACTIVE_NODES:</span>
<span class="text-on-surface">12</span>
</div>
</div>
</div>
</div>
<!-- Map Markers (Positioned Absolutely) -->
<div class="absolute inset-0 pointer-events-none">
<!-- Center Focus Specimen -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-auto">
<div class="relative group cursor-pointer">
<!-- Marker Icon -->
<div class="flex flex-col items-center">
<div class="bg-[#1A1B26] border-2 border-secondary p-xs rounded-sm mb-xs shadow-[4px_4px_0px_0px_rgba(26,27,38,0.5)] active:translate-y-[2px] active:shadow-none transition-all">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="biotech" data-weight="fill" style="font-variation-settings: 'FILL' 1;">biotech</span>
</div>
<!-- Pulse Rings -->
<div class="absolute top-4 left-1/2 -translate-x-1/2 w-12 h-12 border-2 border-secondary rounded-full animate-ping opacity-20"></div>
</div>
<!-- Info Card (Always Visible for the focus specimen) -->
<div class="absolute top-full left-1/2 -translate-x-1/2 mt-sm w-48 bg-surface-container-low border-2 border-[#414868] p-sm shadow-[8px_8px_0px_0px_rgba(26,27,38,0.5)]">
<div class="flex flex-col gap-xs">
<div class="flex items-center justify-between border-b border-[#414868] pb-xs mb-xs">
<h3 class="font-label-caps text-label-caps text-secondary">検体_01</h3>
<span class="font-mono-data text-[10px] text-tertiary px-1 border border-tertiary">LVL 4</span>
</div>
<p class="font-mono-data text-mono-data text-on-surface-variant">0.8 KM 離れています</p>
<button class="w-full mt-xs bg-secondary text-on-secondary px-base py-xs font-label-caps text-label-caps border-b-2 border-[#004e5b] hover:brightness-110 active:translate-y-[2px] active:border-b-0 transition-all flex items-center justify-center gap-xs">
<span>詳細を表示</span>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
</div>
<!-- Ghost Marker 1 -->
<div class="absolute top-1/4 left-1/3 pointer-events-auto">
<div class="flex flex-col items-center opacity-60 hover:opacity-100 transition-opacity cursor-pointer">
<div class="bg-primary-container border-2 border-[#414868] p-xs rounded-sm">
<span class="material-symbols-outlined text-primary" data-icon="sensors">sensors</span>
</div>
<span class="font-label-caps text-[10px] text-on-surface-variant mt-xs">SCANNER_A</span>
</div>
</div>
<!-- Ghost Marker 2 -->
<div class="absolute bottom-1/3 right-1/4 pointer-events-auto">
<div class="flex flex-col items-center opacity-60 hover:opacity-100 transition-opacity cursor-pointer">
<div class="bg-primary-container border-2 border-[#414868] p-xs rounded-sm">
<span class="material-symbols-outlined text-primary" data-icon="science">science</span>
</div>
<span class="font-label-caps text-[10px] text-on-surface-variant mt-xs">SITE_BRAVO</span>
</div>
</div>
</div>
<!-- Bottom Floating Actions -->
<div class="flex justify-end pointer-events-auto">
<div class="flex flex-col gap-sm">
<button class="w-12 h-12 bg-surface-container-high border-2 border-[#414868] text-secondary flex items-center justify-center shadow-[4px_4px_0px_0px_rgba(26,27,38,0.5)] active:translate-y-[2px] active:shadow-none transition-all">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
<button class="w-12 h-12 bg-surface-container-high border-2 border-[#414868] text-secondary flex items-center justify-center shadow-[4px_4px_0px_0px_rgba(26,27,38,0.5)] active:translate-y-[2px] active:shadow-none transition-all">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<button class="w-12 h-12 bg-surface-container-high border-2 border-[#414868] text-secondary flex items-center justify-center shadow-[4px_4px_0px_0px_rgba(26,27,38,0.5)] active:translate-y-[2px] active:shadow-none transition-all">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-2 pb-safe bg-[#1A1B26] border-t-2 border-[#414868]">
<!-- 探索 -->
<a class="flex flex-col items-center justify-center text-[#565F89] py-1 px-4 hover:bg-[#2F3549] transition-transform duration-100 active:translate-y-[4px]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="travel_explore">travel_explore</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase">探索</span>
</a>
<!-- マップ (Active) -->
<a class="flex flex-col items-center justify-center bg-[#2DD4BF] text-[#1A1B26] rounded-sm py-1 px-4 scale-95 shadow-none translate-y-[2px] transition-transform duration-100 active:translate-y-[4px]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="layers">layers</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase">マップ</span>
</a>
<!-- 予約 -->
<a class="flex flex-col items-center justify-center text-[#565F89] py-1 px-4 hover:bg-[#2F3549] transition-transform duration-100 active:translate-y-[4px]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="event_upcoming">event_upcoming</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase">予約</span>
</a>
<!-- システム -->
<a class="flex flex-col items-center justify-center text-[#565F89] py-1 px-4 hover:bg-[#2F3549] transition-transform duration-100 active:translate-y-[4px]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings_input_component">settings_input_component</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold uppercase">システム</span>
</a>
</nav>
</body></html>
